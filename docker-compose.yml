services:
  nginx:
    image: nginx:1.21.1
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www/
    depends_on:
      - php
    platform: linux/amd64  # Apple Silicon 向けに追加（必要に応じて）

  php:
    build: ./docker/php
    volumes:
      - ./src:/var/www/
    platform: linux/amd64  # Apple Silicon 向けに追加

  mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    platform: linux/amd64  # Apple Silicon 向けに追加

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64  # これで警告を消せる
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=laravel_user
      - PMA_PASSWORD=laravel_pass
    depends_on:
      - mysql
    ports:
      - 8080:80
